# Branding values consumed by hooks, package templates, Calamares, and the
# Aptura Shell runtime. Values from config/distro.env are available here.
# For local, untracked overrides create config/branding.local.env.

ID="${DISTRO_ID}"
NAME="${DISTRO_NAME}"
SHORT_NAME="Aptura"
PRETTY_NAME="${DISTRO_PRETTY_NAME}"
VERSION_ID="${DISTRO_VERSION}"
VERSION="${DISTRO_VERSION} (${DESKTOP_NAME})"
VERSION_CODENAME="${DISTRO_CODENAME}"
VARIANT="${DESKTOP_NAME}"
VARIANT_ID="aptura-shell"
ID_LIKE="debian"
ANSI_COLOR="1;36"

HOME_URL="https://aptura.local"
SUPPORT_URL="https://aptura.local/support"
BUG_REPORT_URL="https://aptura.local/issues"
PRIVACY_POLICY_URL="https://aptura.local/privacy"
RELEASE_NOTES_URL="https://aptura.local/releases"

BRAND_SHARE_NAME="aptura"
BRANDING_ASSET_DIR="/usr/share/aptura/branding"
LOGO="distributor-logo-aptura"
LOGO_NAME="${LOGO}"
APP_ICON_NAME="aptura"
APP_ICON="/usr/share/icons/hicolor/scalable/apps/aptura.svg"
USER_ICON="/usr/share/pixmaps/aptura.svg"
LOGO_ASSET="/usr/share/aptura/branding/aptura-logo.svg"
WORDMARK_ASSET="/usr/share/aptura/branding/aptura-wordmark.svg"
BADGE_ASSET="/usr/share/aptura/branding/aptura-badge.svg"

WALLPAPER_DIR="/usr/share/backgrounds/aptura"
DEFAULT_WALLPAPER="/usr/share/backgrounds/aptura/aptura-context-grid.svg"
WALLPAPER="${DEFAULT_WALLPAPER}"
WALLPAPER_ALTERNATIVES="/usr/share/backgrounds/aptura/aptura-retro-cosmic.svg /usr/share/backgrounds/aptura/aptura-special1.svg /usr/share/backgrounds/aptura/aptura-default.svg"

PLYMOUTH_THEME="aptura"
LOGIN_THEME="aptura"
THEME_NAME="Aptura-Shell"
GTK_THEME_NAME="${THEME_NAME}"
ICON_THEME_NAME="Aptura-Shell"
CURSOR_THEME_NAME="Adwaita"
CURSOR_SIZE="24"

SHELL_SESSION_ID="aptura"
SHELL_SESSION_NAME="${DESKTOP_NAME}"
XDG_CURRENT_DESKTOP_NAME="Aptura"
XDG_MENU_PREFIX="aptura-"
PANEL_TITLE="Aptura"
LIVE_USERNAME="aptura"
LIVE_HOSTNAME="aptura-live"
DEFAULT_MODE="aptura-shell"

ACCENT_COLOR="#00d9c0"
SECONDARY_ACCENT_COLOR="#ff4fd8"
WARNING_COLOR="#ffe45c"
ERROR_COLOR="#ff4f6d"
SURFACE_COLOR="#c8c6bc"
SURFACE_DARK_COLOR="#12142b"
SIDEBAR_BACKGROUND_COLOR="#11142b"
SIDEBAR_TEXT_COLOR="#f4f0df"
TEXT_COLOR="#101318"
LIGHT_COLOR="#f4f0df"
MID_COLOR="#7b7c82"
WINDOW_COLOR="#fffaf0"

MOTD_DESCRIPTION="Debian-compatible workstation with Aptura Shell, Wayland defaults, branding, and tooling."
ABOUT_DESCRIPTION="A Debian-compatible desktop distribution with Aptura Shell, Wayland defaults, practical tooling, and a Plasma fallback session."
