<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Aptura OS installer welcome">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11142b"/>
      <stop offset="0.48" stop-color="#12142b"/>
      <stop offset="1" stop-color="#0d1026"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe45c"/>
      <stop offset="1" stop-color="#ff4fd8"/>
    </linearGradient>
    <pattern id="stars" width="90" height="90" patternUnits="userSpaceOnUse">
