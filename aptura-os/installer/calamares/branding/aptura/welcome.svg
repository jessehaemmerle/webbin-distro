      <rect x="14" y="22" width="4" height="4" fill="#f4f0df"/>
      <rect x="68" y="14" width="3" height="3" fill="#00d9c0"/>
      <rect x="42" y="70" width="4" height="4" fill="#ffe45c"/>
    </pattern>
    <clipPath id="sunClip">
