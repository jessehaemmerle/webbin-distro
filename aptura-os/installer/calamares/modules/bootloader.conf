---
efiBootLoader: "grub"
kernel: "/vmlinuz"
img: "/initrd.img"
fallback: "/initrd.img.old"

grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
timeout: 5

# Debian's GRUB EFI binary looks for its config below /EFI/debian. Keep the
# on-screen Aptura branding in GRUB/OS metadata, but install EFI files there.
efiBootloaderId: "debian"
installEFIFallback: true
efiBootMgr: "efibootmgr"

# TODO: Add signed shim/grub path once Secure Boot signing infrastructure exists.
