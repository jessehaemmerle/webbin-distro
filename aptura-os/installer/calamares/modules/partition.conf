efi:
  mountPoint: "/boot/efi"
  recommendedSize: 512MiB
  minimumSize: 300MiB
  label: "APTURA_EFI"

userSwapChoices:
  - none
  - small
  - suspend
  - file

drawNestedPartitions: true
alwaysShowPartitionLabels: true
allowManualPartitioning: true
initialPartitioningChoice: erase

defaultFileSystemType: ext4
availableFileSystemTypes:
  - ext4
  - btrfs
  - xfs

enableLuksAutomatedPartitioning: true
enableLuksHiddenKey: false

partitionLayout:
  - name: "rootfs"
    filesystem: "ext4"
    mountPoint: "/"
    size: 100%

userSwapDefault: file

# Let Calamares choose GPT for UEFI and msdos for BIOS. Forcing GPT in BIOS
# without a bios_grub partition makes grub-install fail.
# defaultPartitionTableType: gpt

# TODO: Add a tested Btrfs subvolume layout before making Btrfs the default.
