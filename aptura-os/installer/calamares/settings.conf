# Aptura OS Calamares settings.
# This is a production-oriented MVP template. Module names and options should be
# verified against the Calamares version shipped by the chosen Debian release.

modules-search:
  - local
  - /usr/lib/calamares/modules

instances:
  - id: aptura-services
    module: services-systemd
    config: services-systemd.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - timezone
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - aptura-services
      - grubcfg
      - bootloader
      - packages
      - luksbootkeyfile
      - initramfscfg
      - initramfs
      - umount
  - show:
      - finished

branding: aptura
prompt-install: false
dont-chroot: false
oem-setup: false

quit-at-end: false
disable-cancel: false
disable-cancel-during-exec: true

hide-back-and-next-during-exec: false
window-expanding: normal
window-size: 1000px,680px
