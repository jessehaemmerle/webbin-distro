# Aptura OS GRUB defaults. The EFI directory remains "debian" for compatibility
# with Debian's GRUB EFI binary; these values brand the generated menu.
GRUB_DISTRIBUTOR="Aptura OS"
GRUB_TIMEOUT_STYLE=menu
GRUB_TIMEOUT=5
GRUB_GFXMODE=auto
GRUB_TERMINAL_OUTPUT=gfxterm
GRUB_DISABLE_OS_PROBER=false
GRUB_COLOR_NORMAL="light-gray/black"
GRUB_COLOR_HIGHLIGHT="light-cyan/black"
