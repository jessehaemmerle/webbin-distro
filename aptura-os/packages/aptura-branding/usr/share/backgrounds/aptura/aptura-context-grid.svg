<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-label="Aptura OS contextual Shell wallpaper">
  <defs>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="#12142b"/>
      <path d="M0 0H96M0 0V96" stroke="#2d3158" stroke-width="4"/>
      <path d="M48 0V96M0 48H96" stroke="#1d2040" stroke-width="2"/>
    </pattern>
    <filter id="hard-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="24" dy="24" stdDeviation="0" flood-color="#000000" flood-opacity="0.62"/>
    </filter>
  </defs>

  <rect width="3840" height="2160" fill="url(#grid)"/>
  <path d="M0 1540H3840V2160H0Z" fill="#101318"/>
  <path d="M0 1540H3840" stroke="#00d9c0" stroke-width="8"/>
  <path d="M0 1730H3840" stroke="#7a4dff" stroke-width="4"/>

  <g filter="url(#hard-shadow)">
    <rect x="440" y="300" width="2960" height="1060" fill="#c8c6bc" stroke="#05070a" stroke-width="10"/>
    <path d="M450 310H3390V1350" fill="none" stroke="#f4f0df" stroke-width="8"/>
    <path d="M3400 310V1360H450" fill="none" stroke="#686a72" stroke-width="8"/>
    <rect x="470" y="330" width="2920" height="104" fill="#12142b" stroke="#05070a" stroke-width="8"/>
    <text x="540" y="400" fill="#f4f0df" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="700">APTURA CONTEXT GRID</text>
    <rect x="3200" y="356" width="56" height="56" fill="#ff4fd8" stroke="#05070a" stroke-width="5"/>
    <rect x="3280" y="356" width="56" height="56" fill="#ffe45c" stroke="#05070a" stroke-width="5"/>

    <g font-family="Courier New, monospace" font-size="34" font-weight="700">
      <g transform="translate(620 600)">
        <rect width="480" height="250" fill="#101318" stroke="#05070a" stroke-width="6"/>
        <path d="M24 70H456M24 125H360M24 180H410" stroke="#00d9c0" stroke-width="18"/>
        <text x="34" y="46" fill="#f4f0df">JOURNEY</text>
      </g>
      <g transform="translate(1240 600)">
        <rect width="480" height="250" fill="#101318" stroke="#05070a" stroke-width="6"/>
        <circle cx="240" cy="138" r="76" fill="none" stroke="#7a4dff" stroke-width="14"/>
        <path d="M240 138L310 78L282 178Z" fill="#00d9c0" stroke="#05070a" stroke-width="5"/>
        <text x="34" y="46" fill="#f4f0df">CONTEXT</text>
      </g>
      <g transform="translate(1860 600)">
        <rect width="480" height="250" fill="#101318" stroke="#05070a" stroke-width="6"/>
        <path d="M100 156H275L232 218H338L400 96H226L268 34H160Z" fill="#ffe45c" stroke="#05070a" stroke-width="8"/>
        <text x="34" y="46" fill="#f4f0df">SHIFT</text>
      </g>
      <g transform="translate(2480 600)">
        <rect width="480" height="250" fill="#101318" stroke="#05070a" stroke-width="6"/>
        <rect x="110" y="88" width="260" height="112" fill="#f4f0df" stroke="#05070a" stroke-width="8"/>
        <path d="M150 145L205 195L330 105" fill="none" stroke="#00a86b" stroke-width="20"/>
        <text x="34" y="46" fill="#f4f0df">AFTERCARE</text>
      </g>
      <g transform="translate(1240 960)">
        <rect width="1360" height="230" fill="#101318" stroke="#05070a" stroke-width="6"/>
        <path d="M120 156H1240" stroke="#00d9c0" stroke-width="22"/>
