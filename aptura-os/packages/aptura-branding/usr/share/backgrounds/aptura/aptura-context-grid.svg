  <g font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">
    <text x="280" y="1888" fill="#00d9c0">local-first</text>
    <text x="870" y="1888" fill="#ff4fd8">state-aware</text>
    <text x="1530" y="1888" fill="#ffe45c">Debian-compatible</text>
    <text x="2400" y="1888" fill="#f4f0df">Shell workstation</text>
