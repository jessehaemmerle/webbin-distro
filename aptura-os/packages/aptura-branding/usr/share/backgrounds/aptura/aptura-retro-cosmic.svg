<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-label="Aptura OS retro Plasma wallpaper">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07051a"/>
      <stop offset="0.48" stop-color="#101348"/>
      <stop offset="0.72" stop-color="#008080"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffff00"/>
      <stop offset="0.48" stop-color="#ff63bd"/>
      <stop offset="1" stop-color="#000080"/>
    </linearGradient>
    <pattern id="dither" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="transparent"/>
      <rect width="6" height="6" fill="#ffffff" opacity="0.08"/>
      <rect x="6" y="6" width="6" height="6" fill="#000000" opacity="0.18"/>
    </pattern>
    <filter id="hard-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="18" dy="18" stdDeviation="0" flood-color="#000000" flood-opacity="0.58"/>
    </filter>
  </defs>

  <rect width="3840" height="2160" fill="url(#sky)"/>
