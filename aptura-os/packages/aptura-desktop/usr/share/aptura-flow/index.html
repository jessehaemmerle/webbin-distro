<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aptura Flow</title>
    <link rel="stylesheet" href="./app.css">
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="flow-root">
      <aside class="sidebar" aria-label="Aptura Flow navigation">
        <section class="brand">
          <img src="./aptura-flow.svg" alt="">
          <div>
            <strong>Aptura</strong>
            <span>Flow</span>
          </div>
        </section>
        <nav class="nav-list" aria-label="Sections">
          <button type="button" data-view="dashboard" class="active">Dashboard</button>
          <button type="button" data-view="launcher">Launcher</button>
          <button type="button" data-view="updates">Updates</button>
          <button type="button" data-view="settings">Settings</button>
          <button type="button" data-view="welcome">Welcome</button>
        </nav>
        <section class="trust-strip">
          <strong>Local first</strong>
          <span>No telemetry</span>
        </section>
      </aside>

      <section class="main-panel">
        <header class="topbar">
          <label class="search-box">
            <span aria-hidden="true">Search</span>
            <input id="search" type="search" placeholder="Apps, settings, system state">
          </label>
          <section class="status-pills" aria-label="System status">
            <span>Debian 13</span>
            <span>Aptura 0.1</span>
          </section>
        </header>

        <section id="view" class="view" aria-live="polite"></section>
      </section>
    </main>
  </body>
</html>
