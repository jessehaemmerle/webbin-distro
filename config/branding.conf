# Aptura OS branding defaults (tracked).
# For local overrides create config/branding.local.env.
# Run scripts/render-branding.sh after changing values here. The full build
# runs the renderer automatically before validation and packaging.

# --- Names shown to users ---------------------------------------------------
BRAND_NAME="Aptura OS"
BRAND_SHORT="Aptura"
BRAND_TAGLINE="A calm Linux for everyday work"
BRAND_VENDOR="Aptura"

# --- Color palette (Aptura Shell) ------------------------------------------
COLOR_BACKGROUND="#12142b"
COLOR_PRIMARY="#00d9c0"
COLOR_ACCENT="#7a4dff"
COLOR_HIGHLIGHT="#ff4fd8"
COLOR_WARNING="#ffb14a"
COLOR_NEUTRAL="#c0c0c0"
COLOR_TEXT="#eef1ff"

# --- Theme identifiers ------------------------------------------------------
GTK_THEME_NAME="Aptura-Shell"
ICON_THEME_NAME="Aptura-Shell"
PLYMOUTH_THEME_NAME="aptura"
GRUB_THEME_NAME="aptura"
SDDM_THEME_NAME="aptura"
CALAMARES_BRANDING_ID="aptura"

# --- Asset paths (relative to repo root) ------------------------------------
LOGO_SVG="branding/assets/logo.svg"
WALLPAPER_DEFAULT="branding/assets/wallpaper-aurora.svg"
WALLPAPER_FALLBACK="branding/assets/wallpaper-grid.svg"
