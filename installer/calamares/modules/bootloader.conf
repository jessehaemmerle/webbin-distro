# GRUB bootloader install. EFI path uses the Aptura-branded directory while
# remaining Debian/Ubuntu-compatible.
---
efiBootLoader: "grub"
kernel: "/boot/vmlinuz"
img: "/boot/initrd.img"
fallback: "/boot/initrd.img"

grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
efiBootMgr: "efibootmgr"

# Branded EFI directory; installDir is created under the ESP.
efiBootloaderId: "Aptura"

installEFIFallback: true
