# GRUB defaults written to /etc/default/grub before grub-mkconfig.
---
overwrite: false
defaults:
  GRUB_TIMEOUT: 5
  GRUB_TIMEOUT_STYLE: "menu"
  GRUB_DISTRIBUTOR: "Aptura OS"
  GRUB_CMDLINE_LINUX_DEFAULT: "quiet splash"
  GRUB_CMDLINE_LINUX: ""
  GRUB_THEME: "/usr/share/grub/themes/aptura/theme.txt"
  GRUB_DISABLE_OS_PROBER: false
