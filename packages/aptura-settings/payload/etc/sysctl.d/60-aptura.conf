# Aptura OS sysctl defaults (desktop workstation).
# Modest hardening that does not interfere with normal desktop use.
kernel.kptr_restrict = 1
kernel.dmesg_restrict = 1
net.ipv4.tcp_syncookies = 1
net.ipv4.conf.all.rp_filter = 1
# Responsiveness under memory pressure on typical desktop RAM sizes.
vm.swappiness = 10
vm.vfs_cache_pressure = 50
